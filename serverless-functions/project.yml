targetNamespace: qctool-production
parameters: {}
packages:
  - name: image-processing
    environment: {}
    parameters: {}
    annotations: {}
    actions:
      - name: convert-image
        runtime: python:3.11
        main: __main__.py
        web: true
        parameters:
          DO_SPACES_KEY: ${DO_SPACES_KEY}
          DO_SPACES_SECRET: ${DO_SPACES_SECRET}
          ORIGINAL_BUCKET: ${ORIGINAL_BUCKET}
          ORIGINAL_BASE_FOLDER: ${ORIGINAL_BASE_FOLDER}
          QC_BUCKET: ${QC_BUCKET}
          QC_BASE_FOLDER: ${QC_BASE_FOLDER}
          SPACES_ENDPOINT: ${SPACES_ENDPOINT}
          SPACES_REGION: ${SPACES_REGION}
          API_BASE_URL: ${API_BASE_URL}
          API_WEBHOOK_SECRET: ${API_WEBHOOK_SECRET}
        limits:
          timeout: 120000  # 2 minutes
          memory: 1024     # 1GB RAM for image processing
        annotations:
          web-export: true
